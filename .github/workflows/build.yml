name: Build and Test

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/build.yml"
      - "ipc/**/*.c"
      - "ipc/**/*.h"
      - "**/meson.build"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build.yml"
      - "ipc/**/*.c"
      - "ipc/**/*.h"
      - "**/meson.build"

jobs:
  linux-build-meson:
    name: Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        compiler: ["gcc", "clang"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.0"
      - name: Install Build Dependencies
        run: |
          pip3 install meson ninja
      - name: Setup Meson
        run: |
          CC=${{ matrix.compiler }} meson setup build
      - name: Build
        run: |
          CC=${{ matrix.compiler }} meson compile -C build
      - name: Verbosely Test
        run: |
          meson test -v -C build
  windows-build-meson:
    name: Windows
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        compiler: ["cl.exe", "gcc.exe"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.0"
      - uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Build Dependencies
        run: |
          pip3 install meson ninja
      - name: Setup Meson
        run: |
          meson setup build
        env:
          CC: ${{ matrix.compiler }}
      - name: Build
        run: |
          meson compile -C build
        env:
          CC: ${{ matrix.compiler }}
      - name: Verbosely Test
        run: |
          meson test -v -C build
