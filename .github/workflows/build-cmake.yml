name: CMake

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/build-cmake.yml"
      - "ipc/**/*.c"
      - "ipc/**/*.h"
      - "test/*.c"
      - "**/CMakeLists.txt"
      - "cmake/*.cmake"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-cmake.yml"
      - "ipc/**/*.c"
      - "ipc/**/*.h"
      - "test/*.c"
      - "**/CMakeLists.txt"
      - "cmake/*.cmake"

jobs:
  linux-build-cmake:
    name: Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        compiler: ["gcc", "clang"]
    steps:
      - uses: actions/checkout@v5
      - name: Install Build Dependencies
          echo | python "${{ github.workspace }}/bin/acquire_epos_cmdlib.py"
      - name: Setup CMake
        run: |
          CC=${{ matrix.compiler }} cmake -S . -B build
      - name: Build
        run: |
          CC=${{ matrix.compiler }} cmake --build build
      - name: Verbosely Test
        run: |
          ctest --verbose --output-on-failure --test-dir build/test

  windows-build-cmake:
    name: Windows
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        compiler: ["cl.exe", "gcc.exe"]
    steps:
      - uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1.13.0
      - name: Install Build Dependencies
          echo "" | python "${{ github.workspace }}/bin/acquire_epos_cmdlib.py"
      - name: Setup CMake
        run: |
          cmake -S . -B build
        env:
          CC: ${{ matrix.compiler }}
      - name: Build
        run: |
          cmake --build build
        env:
          CC: ${{ matrix.compiler }}
      - name: Verbosely Test
        run: |
          ctest --verbose --output-on-failure --test-dir build/test -C Debug
